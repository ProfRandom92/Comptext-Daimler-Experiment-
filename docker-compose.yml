version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - LLM_BACKEND=ollama_gemma
      - OLLAMA_URL=http://ollama:11434
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      - ollama

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - LLM_BACKEND=ollama_gemma
      - OLLAMA_URL=http://ollama:11434
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama_data:
