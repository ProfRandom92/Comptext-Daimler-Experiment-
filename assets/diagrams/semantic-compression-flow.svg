<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">KVTC semantic compression flow</title><desc id="desc">A document is sanitized, split into zones, converted to key/value/type/code layers, serialized, checksummed, and evaluated.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9" fill="#22d3ee"/></marker><style>.bg{fill:#07111f}.t{font:700 30px Inter,Arial;fill:#f8fafc}.s{font:500 14px Inter,Arial;fill:#94a3b8}.h{font:700 17px Inter,Arial;fill:#e2e8f0}.p{font:500 13px Inter,Arial;fill:#aab7ca}.box{fill:#0f1b2d;stroke:#263b59;stroke-width:1.4}.hot{fill:#102840;stroke:#22d3ee;stroke-width:2}.line{stroke:#22d3ee;stroke-width:3;marker-end:url(#a);fill:none}.pill{fill:#164e63}.pillt{font:700 11px Inter,Arial;fill:#cffafe}</style></defs>
  <rect class="bg" width="1280" height="520" rx="26"/><text x="52" y="64" class="t">KVTC semantic compression flow</text><text x="52" y="94" class="s">Not a black-box summary: each stage exposes typed retention evidence and replay metadata.</text>
  <g transform="translate(54 150)"><rect class="box" width="180" height="145" rx="18"/><text x="26" y="42" class="h">Raw synthetic note</text><text x="26" y="72" class="p">diagnostic log</text><text x="26" y="94" class="p">shift report</text><text x="26" y="116" class="p">QA checklist</text></g>
  <path class="line" d="M244 222 H296"/>
  <g transform="translate(306 150)"><rect class="box" width="180" height="145" rx="18"/><text x="26" y="42" class="h">Sanitize</text><text x="26" y="72" class="p">mask identifiers</text><text x="26" y="94" class="p">strip unsafe HTML</text><text x="26" y="116" class="p">preserve signal</text></g>
  <path class="line" d="M496 222 H548"/>
  <g transform="translate(558 150)"><rect class="hot" width="180" height="145" rx="18"/><text x="26" y="42" class="h">Zone split</text><text x="26" y="72" class="p">header retained</text><text x="26" y="94" class="p">middle filtered</text><text x="26" y="116" class="p">recent window retained</text></g>
  <path class="line" d="M748 222 H800"/>
  <g transform="translate(810 150)"><rect class="hot" width="180" height="145" rx="18"/><text x="26" y="42" class="h">KVTC layers</text><rect x="28" y="62" width="30" height="24" rx="12" class="pill"/><text x="38" y="79" class="pillt">K</text><rect x="66" y="62" width="30" height="24" rx="12" class="pill"/><text x="76" y="79" class="pillt">V</text><rect x="104" y="62" width="30" height="24" rx="12" class="pill"/><text x="114" y="79" class="pillt">T</text><rect x="142" y="62" width="30" height="24" rx="12" class="pill"/><text x="152" y="79" class="pillt">C</text><text x="26" y="116" class="p">typed operational facts</text></g>
  <path class="line" d="M1000 222 H1052"/>
  <g transform="translate(1062 150)"><rect class="box" width="180" height="145" rx="18"/><text x="26" y="42" class="h">Frame artifact</text><text x="26" y="72" class="p">serialized payload</text><text x="26" y="94" class="p">SHA-256 checksum</text><text x="26" y="116" class="p">token + latency metadata</text></g>
  <rect x="124" y="382" width="1030" height="54" rx="27" fill="#081827" stroke="#1f3b57"/><text x="154" y="416" class="s">Retention is evaluated by required fields, deterministic triage stability, report-contract validation, and checksum replay — not by compression ratio alone.</text>
</svg>
