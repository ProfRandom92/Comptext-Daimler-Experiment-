<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc"><title id="title">Replay pipeline</title><desc id="desc">Compressed frames use checksums to connect source fixture, triage, analysis output, cache behavior, and benchmark reports.</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9" fill="#c084fc"/></marker><style>.t{font:700 32px Inter,Arial;fill:#f8fafc}.s{font:500 14px Inter,Arial;fill:#94a3b8}.h{font:700 17px Inter,Arial;fill:#e2e8f0}.p{font:500 13px Inter,Arial;fill:#aab7ca}.b{fill:#0f1b2d;stroke:#3b2f59}.hot{fill:#20143a;stroke:#c084fc;stroke-width:2}.l{stroke:#c084fc;stroke-width:3;marker-end:url(#a);fill:none}.hash{font:700 13px ui-monospace,Menlo,monospace;fill:#ddd6fe}</style></defs><rect width="1280" height="520" rx="26" fill="#07111f"/><text x="52" y="66" class="t">Replay-aware artifact chain</text><text x="52" y="96" class="s">Each run links decisions to compressed frames and report artifacts without storing raw production payloads.</text><g transform="translate(84 156)"><rect class="b" width="190" height="105" rx="16"/><text x="28" y="42" class="h">Fixture / request</text><text x="28" y="70" class="p">synthetic payload</text></g><path class="l" d="M284 208 H352"/><g transform="translate(362 156)"><rect class="hot" width="220" height="105" rx="16"/><text x="28" y="38" class="h">Compressed frame</text><text x="28" y="66" class="hash">sha256: checksum</text><text x="28" y="88" class="p">token + zone metadata</text></g><path class="l" d="M592 208 H660"/><g transform="translate(670 108)"><rect class="b" width="205" height="92" rx="16"/><text x="28" y="38" class="h">Triage replay</text><text x="28" y="66" class="p">rule hits + priority</text></g><g transform="translate(670 232)"><rect class="b" width="205" height="92" rx="16"/><text x="28" y="38" class="h">Analysis replay</text><text x="28" y="66" class="p">mock/local/cloud mode</text></g><path class="l" d="M885 154 H950"/><path class="l" d="M885 278 H950"/><g transform="translate(960 156)"><rect class="b" width="220" height="105" rx="16"/><text x="28" y="42" class="h">Review artifacts</text><text x="28" y="70" class="p">benchmark + regression</text><text x="28" y="92" class="p">contract validation</text></g><rect x="140" y="370" width="1000" height="54" rx="27" fill="#10182a" stroke="#2d2542"/><text x="175" y="404" class="s">Replay value: reviewers can compare checksums, deterministic triage outputs, and generated reports between runs before trusting any headline metric.</text></svg>
