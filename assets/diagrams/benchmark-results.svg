<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc"><title id="title">Benchmark result visual</title><desc id="desc">Current synthetic endpoint sample shows mixed compression ratios: short inputs expand while longer QA checklist compresses; latency remains sub-millisecond in in-process mock sample.</desc><style>.t{font:700 32px Inter,Arial;fill:#f8fafc}.s{font:500 14px Inter,Arial;fill:#94a3b8}.h{font:700 16px Inter,Arial;fill:#e2e8f0}.p{font:500 13px Inter,Arial;fill:#aab7ca}.axis{stroke:#334155;stroke-width:1}.pos{fill:#22c55e}.neg{fill:#f59e0b}.b{fill:#0f1b2d;stroke:#263b59}.mono{font:700 13px ui-monospace,Menlo,monospace;fill:#cbd5e1}</style><rect width="1280" height="560" rx="26" fill="#07111f"/><text x="52" y="66" class="t">Synthetic benchmark interpretation</text><text x="52" y="96" class="s">In-process sample from /benchmark. Negative reduction means metadata overhead exceeds savings for short inputs.</text><line x1="120" y1="350" x2="1120" y2="350" class="axis"/><line x1="620" y1="150" x2="620" y2="405" class="axis"/><text x="594" y="374" class="p">0%</text><text x="118" y="138" class="h">Token reduction % by fixture</text><rect x="305" y="172" width="315" height="34" rx="8" class="neg"/><text x="128" y="195" class="h">Maintenance note</text><text x="634" y="195" class="mono">-57.14%</text><rect x="586" y="237" width="34" height="34" rx="8" class="neg"/><text x="128" y="260" class="h">Diagnostic log</text><text x="634" y="260" class="mono">-6.12%</text><rect x="620" y="302" width="156" height="34" rx="8" class="pos"/><text x="128" y="325" class="h">QA checklist</text><text x="790" y="325" class="mono">31.22%</text><g transform="translate(845 145)"><rect class="b" width="330" height="225" rx="18"/><text x="28" y="42" class="h">What this proves</text><text x="28" y="75" class="p">• Scripts and artifacts are reproducible.</text><text x="28" y="103" class="p">• Compression tradeoffs are visible.</text><text x="28" y="131" class="p">• Short payload expansion is disclosed.</text><text x="28" y="159" class="p">• Report contracts validate shape.</text><text x="28" y="197" class="h">What it does not prove</text><text x="28" y="225" class="p">Production model accuracy or universal savings.</text></g><rect x="90" y="440" width="1100" height="52" rx="26" fill="#0c1c2c" stroke="#1f3b57"/><text x="124" y="472" class="s">Methodology principle: evaluate token savings with retained required signals, replay consistency, latency, and error rate — never ratio alone.</text></svg>
