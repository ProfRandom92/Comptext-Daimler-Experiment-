<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc"><title id="title">CI flow</title><desc id="desc">Pull requests run Python lint and tests, coverage, React build, Render entrypoint validation, Docker build, benchmark safety reports, and optional live smoke checks.</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9" fill="#60a5fa"/></marker><style>.t{font:700 32px Inter,Arial;fill:#f8fafc}.s{font:500 14px Inter,Arial;fill:#94a3b8}.h{font:700 17px Inter,Arial;fill:#e2e8f0}.p{font:500 13px Inter,Arial;fill:#aab7ca}.b{fill:#0f1b2d;stroke:#263b59}.g{fill:#0f2a1d;stroke:#22c55e}.l{stroke:#60a5fa;stroke-width:3;marker-end:url(#a);fill:none}</style></defs><rect width="1280" height="520" rx="26" fill="#07111f"/><text x="52" y="66" class="t">CI and evidence flow</text><text x="52" y="96" class="s">Checks are separated into runtime correctness, presentation build, container build, benchmark artifact safety, and live demo smoke paths.</text><g transform="translate(70 155)"><rect class="b" width="170" height="100" rx="16"/><text x="48" y="42" class="h">PR / push</text><text x="34" y="70" class="p">main + claude/**</text></g><path class="l" d="M250 205 H304"/><g transform="translate(315 120)"><rect class="g" width="195" height="92" rx="16"/><text x="32" y="38" class="h">Python quality</text><text x="32" y="66" class="p">ruff + pytest matrix</text></g><g transform="translate(315 245)"><rect class="g" width="195" height="92" rx="16"/><text x="32" y="38" class="h">Coverage</text><text x="32" y="66" class="p">term-missing report</text></g><path class="l" d="M520 166 H574"/><path class="l" d="M520 291 H574"/><g transform="translate(585 120)"><rect class="b" width="195" height="92" rx="16"/><text x="32" y="38" class="h">React showcase</text><text x="32" y="66" class="p">npm ci + build</text></g><g transform="translate(585 245)"><rect class="b" width="195" height="92" rx="16"/><text x="32" y="38" class="h">Render entrypoint</text><text x="32" y="66" class="p">static + health route</text></g><path class="l" d="M790 166 H844"/><path class="l" d="M790 291 H844"/><g transform="translate(855 120)"><rect class="b" width="195" height="92" rx="16"/><text x="32" y="38" class="h">Docker image</text><text x="32" y="66" class="p">build verification</text></g><g transform="translate(855 245)"><rect class="b" width="195" height="92" rx="16"/><text x="32" y="38" class="h">Benchmark safety</text><text x="32" y="66" class="p">reports + contracts</text></g><path class="l" d="M1060 205 H1114"/><g transform="translate(1125 155)"><rect class="b" width="110" height="100" rx="16"/><text x="26" y="42" class="h">Artifacts</text><text x="17" y="70" class="p">reviewable</text></g><text x="70" y="430" class="s">Scheduled path: Demo Live Smoke checks the public service URL separately, so core CI remains reproducible without external service dependence.</text></svg>
