<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc"><title id="title">Validation pipeline</title><desc id="desc">Synthetic fixtures are checked by unit tests, sanitization, benchmark generation, regression comparison, report-contract validation, and reviewer interpretation.</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9" fill="#34d399"/></marker><style>.t{font:700 32px Inter,Arial;fill:#f8fafc}.s{font:500 14px Inter,Arial;fill:#94a3b8}.h{font:700 16px Inter,Arial;fill:#e2e8f0}.p{font:500 13px Inter,Arial;fill:#aab7ca}.b{fill:#0f1b2d;stroke:#2a405e}.l{stroke:#34d399;stroke-width:3;marker-end:url(#a);fill:none}.num{font:700 20px Inter,Arial;fill:#34d399}</style></defs><rect width="1280" height="520" rx="26" fill="#07111f"/><text x="52" y="66" class="t">Validation pipeline</text><text x="52" y="96" class="s">Validation focuses on safety, structure, replayability, and regression evidence. It does not claim production model quality.</text><g transform="translate(70 170)"><rect class="b" width="155" height="115" rx="16"/><text x="24" y="42" class="num">01</text><text x="24" y="70" class="h">Synthetic fixtures</text><text x="24" y="94" class="p">safe inputs only</text></g><path class="l" d="M235 228 H286"/><g transform="translate(296 170)"><rect class="b" width="155" height="115" rx="16"/><text x="24" y="42" class="num">02</text><text x="24" y="70" class="h">Unit + API tests</text><text x="24" y="94" class="p">behavior checks</text></g><path class="l" d="M461 228 H512"/><g transform="translate(522 170)"><rect class="b" width="155" height="115" rx="16"/><text x="24" y="42" class="num">03</text><text x="24" y="70" class="h">Sanitizer</text><text x="24" y="94" class="p">artifact safety</text></g><path class="l" d="M687 228 H738"/><g transform="translate(748 170)"><rect class="b" width="155" height="115" rx="16"/><text x="24" y="42" class="num">04</text><text x="24" y="70" class="h">Benchmark report</text><text x="24" y="94" class="p">JSON + Markdown</text></g><path class="l" d="M913 228 H964"/><g transform="translate(974 170)"><rect class="b" width="155" height="115" rx="16"/><text x="24" y="42" class="num">05</text><text x="24" y="70" class="h">Contracts</text><text x="24" y="94" class="p">shape validation</text></g><rect x="170" y="365" width="940" height="52" rx="26" fill="#0c1c2c" stroke="#1f3b57"/><text x="205" y="397" class="s">Reviewer decision: inspect reduction, retained signals, latency, error rate, missing tooling notes, and limitations before drawing conclusions.</text></svg>
