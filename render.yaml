services:
  - type: web
    name: comptext-daimler-buses
    runtime: docker
    region: frankfurt
    plan: free
    dockerCommand: uvicorn render_app:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    disk:
      name: cache
      mountPath: /cache
      sizeGB: 10
    envVars:
      - key: LLM_BACKEND
        value: mock
      - key: CACHE_MAX_SIZE
        value: "256"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: ALLOWED_ORIGINS
        value: "https://comptext-daimler-buses.onrender.com,http://localhost:5173,http://localhost:3000"
      - key: TINYBIRD_TOKEN
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
