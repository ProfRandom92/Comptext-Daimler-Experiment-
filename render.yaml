services:
  - type: web
    name: comptext-daimler-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerCommand: uvicorn api:app --host 0.0.0.0 --port $PORT --workers 2
    disk:
      name: cache
      mountPath: /cache
      sizeGB: 10
    envVars:
      - key: LLM_BACKEND
        value: mock
      - key: CACHE_MAX_SIZE
        value: "256"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: ALLOWED_ORIGINS
        value: "https://comptext-daimler-api.onrender.com"
      - key: TINYBIRD_TOKEN
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
