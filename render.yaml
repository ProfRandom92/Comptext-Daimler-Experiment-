services:
  - type: web
    name: comptext-daimler-api
    runtime: docker
    region: frankfurt
    plan: free
    disk:
      name: cache
      mountPath: /cache
      sizeGB: 10
    envVars:
      - key: LLM_BACKEND
        value: mock
      - key: CACHE_MAX_SIZE
        value: "256"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "https://comptext-daimler-api.onrender.com"
      - key: TINYBIRD_TOKEN
        sync: false
