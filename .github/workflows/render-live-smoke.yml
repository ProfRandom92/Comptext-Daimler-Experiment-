name: Render Live Smoke

on:
  workflow_dispatch:
    inputs:
      render_url:
        description: Public Render service URL
        required: false
        default: https://comptext-daimler-api-jules.onrender.com
  schedule:
    - cron: '17 7 * * *'

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run public Render smoke checks
        run: |
          URL="${{ github.event.inputs.render_url || 'https://comptext-daimler-api-jules.onrender.com' }}"
          python scripts/check_render_live.py --url "$URL" --attempts 4 --delay 12 --timeout 25
